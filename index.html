<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Logo UP Preto.png" type="image/x-icon">
    <link rel="icon" href="UP.png" type="image/x-icon" media="(prefers-color-scheme: dark)">
    <title>Calendário UP</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            align-items: center;

            background-color: #000;
        }

        #bg {
            background-image: url("54987709272_f3f5ec4fc2_k.jpg");
            height: 100%;
            width: 100%;
            position: absolute;
            filter: grayscale(100);
            opacity: 25%;
        }

        .container {
            width: 50%;
            height: 90%;
            border-radius: 25px;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            background-color: #3338;
            backdrop-filter: blur(5px);
            box-shadow: inset 0px 20px 20px -20px #0008;

            z-index: 1;

            & h2 {
                padding: 25px;
                color: #fff;
            }

            & iframe {
                width: 100%;
                height: 100%;
                border-radius: 25px;
            }
        }

        img {
            position: absolute;
            bottom: 25px;
            left: 25px;
            z-index: 1;
        }

        h3{
            text-align: right;
            color: #fff;
            position: absolute;
            bottom: 25px;
            right: 25px;

            z-index: 1;
        }

        @media (max-width: 1024px) {

            .container {
                width: 90%;
                height: 80%;
                margin-bottom: 100px;
            }
        }
    </style>
</head>

<body>
    <div id="bg"></div>
    <div class="container">
        <h2>Calendário sede da Unidade Popular</h2>
        <iframe
            src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FSao_Paulo&showPrint=0&showTabs=0&showDate=0&showNav=0&showTitle=0&showCalendars=0&showTz=0&hl=pt_BR&mode=WEEK&src=ODZkMWJjN2M2ODNmZGU1NTFhY2Q1OTBhOTE1NTJjZTY0NDc0YmRjZmZjNDIyMzA3MjI4MDA1MWNiZGI1MTEzY0Bncm91cC5jYWxlbmRhci5nb29nbGUuY29t&color=%23616161"
            style="border-width:0" frameborder="0" scrolling="no"></iframe>
    </div>
    <a href="https://unidadepopular.org.br/" target="_blank"><img src="UP.png" alt="" style="height: 50px;"></a>
    <a href="http://" target="_blank"><h3>Feito pelo<br>Núcleo de TI - MLC DF</h3></a>
</body>

</html>
